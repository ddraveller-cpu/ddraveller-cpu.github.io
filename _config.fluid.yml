###############################
# 主题配置 - Fluid
###############################

# 全局
navbar:
  blog_title: "Leon"
  ground_glass:
    enable: true

# 首页
index:
  banner_img: https://r2.fluidweb.cn/material@3.0/volunteer.png
  banner_img_height: 100
  slogan:
    enable: true
    text: "这里是 Leon 的个人博客"

# 文章页
post:
  banner_img: https://r2.fluidweb.cn/material@3.0/volunteer.png
  banner_img_height: 70
  default_index_img: https://r2.fluidweb.cn/material@3.0/volunteer.png

# 归档页
archive:
  banner_img: https://r2.fluidweb.cn/material@3.0/volunteer.png
  banner_img_height: 60

# 分类页
category:
  banner_img: https://r2.fluidweb.cn/material@3.0/volunteer.png
  banner_img_height: 60

# 标签页
tag:
  banner_img: https://r2.fluidweb.cn/material@3.0/volunteer.png
  banner_img_height: 60

# 关于页
about:
  banner_img: https://r2.fluidweb.cn/material@3.0/volunteer.png
  banner_img_height: 60
  avatar: https://r2.fluidweb.cn/material@3.0/avatar.png
  name: "Leon"
  intro: "这里是描述"

# 页脚
footer:
  content: '<a href="https://hexo.io" target="_blank" rel="nofollow noopener"><span>Hexo</span></a> <i class="iconfont icon-love"></i> <a href="https://github.com/fluid-dev/hexo-theme-fluid" target="_blank" rel="nofollow noopener"><span>Fluid</span></a>'

# 深色模式
dark_mode:
  enable: true
  default: auto

# 代码高亮
code:
  copy_btn: true
  highlight:
    enable: true
    theme: atom-one-dark
    theme_dark: atom-one-dark

# 评论系统 (可选)
comments:
  enable: false

# 统计
web_analytics:
  enable: false